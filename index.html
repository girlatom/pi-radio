<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100vh;background:#000;overflow:hidden;font-family:'Share Tech Mono',monospace}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.08}}

.earth-bg{position:fixed;inset:0;z-index:1}
.earth-bg iframe{width:100%;height:100%;border:none;pointer-events:none}
.pi-layer{position:fixed;inset:0;z-index:2;pointer-events:none;transform-origin:top left}

/* HUD */
.hud{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:100;
  display:flex;gap:8px;align-items:center;background:rgba(0,0,0,0.75);
  border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:7px 14px;
  pointer-events:all;white-space:nowrap;}
.hl{font-size:9px;color:#444;letter-spacing:.1em}
.hb{background:none;border:1px solid #222;border-radius:4px;color:#333;
  font-family:'Share Tech Mono',monospace;font-size:9px;padding:3px 9px;
  cursor:pointer;letter-spacing:.06em;transition:all .15s}
.hb:hover{border-color:#666;color:#777}
.hb.on{border-color:#ff2d6b;color:#ff2d6b}
.hsep{width:1px;height:14px;background:#1a1a1a;margin:0 4px}

/* 翻牌板 */
.board-wrap{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-54%);
  width:1300px;z-index:10;pointer-events:all;
}
.board{
  background:rgba(10,10,8,0.65);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:10px;padding:0;overflow:hidden;
  backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
}

/* ── Topbar ── */
.topbar{
  display:flex;align-items:stretch;
  border-bottom:1px solid rgba(255,255,255,0.07);
  min-height:56px;
}

/* 左側：紅點 + LIVE + logo */
.topbar-left{
  display:flex;align-items:center;gap:10px;
  padding:0 20px;
  border-right:1px solid rgba(255,255,255,0.07);
  flex-shrink:0;
}
.live-dot{width:8px;height:8px;border-radius:50%;background:#ff2d6b;
  animation:blink 1.4s ease-in-out infinite;flex-shrink:0}
.live-text{font-size:12px;color:#888;letter-spacing:.16em;font-weight:700}
.logo-sep-bar{width:1px;height:18px;background:rgba(255,255,255,0.15);margin:0 2px}
.logo-wm{font-size:20px;font-weight:700;color:#fff;letter-spacing:.04em;line-height:1}
.logo-colon{color:rgba(255,255,255,0.3);margin:0 3px}
.logo-inf{color:#ff2d6b}

/* 中間：π 位數（重要資訊，大字） */
.topbar-mid{
  flex:1;display:flex;align-items:center;justify-content:center;gap:16px;
  padding:0 20px;
}
.pi-digits-label{font-size:11px;color:#4a9eff;letter-spacing:.14em;text-transform:uppercase;font-weight:700}
.pi-digits-val{font-size:18px;color:#fff;letter-spacing:.06em;font-weight:700}

/* 右側：時鐘 */
.topbar-right{
  display:flex;align-items:center;justify-content:flex-end;
  padding:0 20px;
  border-left:1px solid rgba(255,255,255,0.07);
  flex-shrink:0;
}
.clk{font-size:16px;color:#fff;letter-spacing:.2em;font-weight:700}

/* ── 格子 ── */
.grid{display:grid;grid-template-columns:repeat(22,1fr);gap:3px;padding:14px 14px 0}
.cell{
  aspect-ratio:.65;position:relative;border-radius:3px;overflow:hidden;
  background:rgba(18,18,16,0.75);
  border-top:1px solid rgba(55,55,50,0.6);
  border-bottom:1px solid rgba(0,0,0,0.5);
  display:flex;flex-direction:column;
}
.half-top{
  flex:1;overflow:hidden;display:flex;align-items:flex-end;justify-content:center;
  background:rgba(20,20,18,0.75);transform-origin:bottom center;
}
.half-bot{
  flex:1;overflow:hidden;display:flex;align-items:flex-start;justify-content:center;
  background:rgba(14,14,12,0.72);border-top:1px solid rgba(0,0,0,0.6);
}
.half-top .n{font-size:clamp(18px,2.2vw,32px);font-weight:700;color:#fff;transform:translateY(52%);display:block;line-height:1}
.half-bot .n{font-size:clamp(18px,2.2vw,32px);font-weight:700;color:#ccc;transform:translateY(-52%);display:block;line-height:1}

/* ── 底部資訊列 ── */
.info-bar{
  display:flex;align-items:stretch;
  margin-top:10px;
  border-top:1px solid rgba(255,255,255,0.07);
}
.info-cell{
  flex:1;background:rgba(6,6,8,0.9);
  padding:10px 14px;display:flex;flex-direction:column;gap:5px;
}
.info-cell:not(:last-child){border-right:1px solid rgba(255,255,255,0.06)}
.info-label{font-size:10px;color:#4a9eff;letter-spacing:.14em;text-transform:uppercase;font-weight:700}

/* BPM 時段曲線 */
.bpm-curve-wrap{position:relative;height:32px;display:flex;align-items:flex-end}
.bpm-val{font-size:16px;color:#fff;letter-spacing:.06em;font-weight:700;white-space:nowrap}
.bpm-mood{font-size:10px;color:#666;letter-spacing:.08em;margin-left:8px;align-self:flex-end;padding-bottom:2px}
canvas#bpm-curve{position:absolute;inset:0;width:100%;height:100%}

/* 琴鍵白色 bar */
.piano-keys{
  display:flex;align-items:flex-end;gap:3px;height:32px;flex:1;
}
.pkey{
  flex:1;border-radius:2px 2px 0 0;
  background:#fff;opacity:.12;min-height:3px;
  transition:height .09s ease,opacity .09s ease;
}
.status-row{display:flex;align-items:center;gap:8px;margin-top:2px}
.sdot{width:6px;height:6px;border-radius:50%;background:#333;flex-shrink:0;transition:background .3s}
.sdot.on{background:#4a9eff;animation:blink 2s ease-in-out infinite}
.status-txt{font-size:11px;color:#555;letter-spacing:.08em}
</style>
</head>
<body>

<div class="earth-bg">
  <iframe id="bgf"
    src="https://www.youtube.com/embed/fO9e9jnhYK8?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&playsinline=1"
    allow="autoplay; encrypted-media; fullscreen" allowfullscreen>
  </iframe>
</div>

<div class="pi-layer" id="pilayer">
  <div class="board-wrap">
    <div class="board">

      <!-- Topbar -->
      <div class="topbar">
        <div class="topbar-left">
          <div class="live-dot"></div>
          <span class="live-text">LIVE</span>
          <div class="logo-sep-bar"></div>
          <span class="logo-wm">π<span class="logo-colon"> : </span>radi<span class="logo-inf">∞</span></span>
        </div>
        <div class="topbar-mid">
          <span class="pi-digits-label">π sequence</span>
          <span class="pi-digits-val" id="prange">digits 1 – 88</span>
        </div>
        <div class="topbar-right">
          <div class="clk" id="clk">00:00:00</div>
        </div>
      </div>

      <!-- 翻牌格子 -->
      <div class="grid" id="grid"></div>

      <!-- 底部資訊列 -->
      <div class="info-bar">

        <!-- BPM + 時段曲線 -->
        <div class="info-cell" style="flex:3;position:relative">
          <div class="info-label">tempo</div>
          <div style="display:flex;align-items:baseline;gap:8px">
            <span class="bpm-val" id="bpmv">-- BPM</span>
            <span class="bpm-mood" id="mood">--</span>
          </div>
          <div class="bpm-curve-wrap" style="margin-top:4px;height:28px">
            <canvas id="bpm-curve" width="300" height="28"></canvas>
          </div>
        </div>

        <!-- π music 琴鍵 bar -->
        <div class="info-cell" style="flex:4">
          <div class="info-label">π music</div>
          <div class="piano-keys" id="pkeys"></div>
          <div class="status-row">
            <div class="sdot" id="sdot"></div>
            <span class="status-txt" id="status">click to start</span>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- HUD -->
<div class="hud">
  <span class="hl">overlay</span>
  <button class="hb on" id="vtog" onclick="toggleVis()">visible</button>
  <div class="hsep"></div>
  <span class="hl">opacity</span>
  <input type="range" min="20" max="100" value="100" step="1"
    style="width:72px;accent-color:#ff2d6b;cursor:pointer"
    oninput="setOp(this.value)">
  <div class="hsep"></div>
  <span class="hl">source</span>
  <button class="hb on" onclick="setSrc('fO9e9jnhYK8',this)">Sen ISS</button>
  <button class="hb" onclick="setSrc('BHACKCNDMW8',this)">NASA TV</button>
  <div class="hsep"></div>
  <button class="hb" onclick="triggerChime()" style="color:#444;border-color:#222">⏰ chime</button>
</div>

<script>
function scaleOverlay(){
  const layer=document.getElementById('pilayer');
  const scale=Math.min(window.innerWidth/1920,window.innerHeight/1080);
  layer.style.transform=`scale(${scale})`;
  layer.style.width='1920px';layer.style.height='1080px';
  layer.style.transformOrigin='top left';
  layer.style.left=((window.innerWidth-1920*scale)/2)+'px';
  layer.style.top=((window.innerHeight-1080*scale)/2)+'px';
}
window.addEventListener('resize',scaleOverlay);
scaleOverlay();

let vis=true;
function toggleVis(){
  vis=!vis;
  document.getElementById('pilayer').style.opacity=vis?'1':'0';
  const b=document.getElementById('vtog');
  b.textContent=vis?'visible':'hidden';
  b.classList.toggle('on',vis);
}
function setOp(v){document.getElementById('pilayer').style.opacity=v/100;}
function setSrc(id,btn){
  document.getElementById('bgf').src=`https://www.youtube.com/embed/${id}?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&playsinline=1`;
  document.querySelectorAll('.hb').forEach(b=>{if(['Sen ISS','NASA TV'].includes(b.textContent))b.classList.remove('on');});
  btn.classList.add('on');
}

// 建立琴鍵 bar（22 鍵，對應 22 列）
const pkeysEl=document.getElementById('pkeys');
const pkeys=[];
for(let i=0;i<22;i++){
  const k=document.createElement('div');k.className='pkey';
  pkeysEl.appendChild(k);pkeys.push(k);
}

// BPM 曲線（24小時，cosine，正午最快）
function drawBpmCurve(){
  const canvas=document.getElementById('bpm-curve');
  if(!canvas) return;
  const W=canvas.offsetWidth||300,H=28;
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const BPM_MAX=96,BPM_MIN=42,PEAK=12;
  // 曲線
  ctx.beginPath();
  for(let px=0;px<W;px++){
    const h=px/W*24;
    const t=(Math.cos(((h-PEAK)/12)*Math.PI)+1)/2;
    const bpm=BPM_MIN+(BPM_MAX-BPM_MIN)*t;
    const y=H-2-(bpm-BPM_MIN)/(BPM_MAX-BPM_MIN)*(H-4);
    px===0?ctx.moveTo(px,y):ctx.lineTo(px,y);
  }
  ctx.strokeStyle='rgba(74,158,255,0.3)';ctx.lineWidth=1.5;ctx.stroke();
  // 填色
  ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();
  ctx.fillStyle='rgba(74,158,255,0.08)';ctx.fill();
  // 現在位置
  const now=new Date(),h=now.getHours()+now.getMinutes()/60;
  const px=h/24*W;
  const t=(Math.cos(((h-PEAK)/12)*Math.PI)+1)/2;
  const bpm=BPM_MIN+(BPM_MAX-BPM_MIN)*t;
  const y=H-2-(bpm-BPM_MIN)/(BPM_MAX-BPM_MIN)*(H-4);
  ctx.beginPath();ctx.arc(px,y,3.5,0,Math.PI*2);
  ctx.fillStyle='#4a9eff';ctx.fill();
  // 時間軸標籤
  ctx.font='8px Share Tech Mono,monospace';
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ['0','6','12','18'].forEach((label,i)=>{
    ctx.fillText(label,i/4*W+(i===0?1:-4),H-1);
  });
}

// π overlay 主程式
const PI="14159265358979323846264338327950288419716939937510582097494459230781640628620899862803482534211706798214808651328230664709384460955058223172535940812848111745028410270193852110555964462294895493038196444288109756659334461284756482337867831652712019091456485669234603486104543266482133936072602491412737245870066063155881748815209209628292540917153643678925903600113305305488204665213841469519415116094330572703657595919530921861173819326117931051185480744623799627495673518857527248912279381830119491298336733624406566430860213949463952247371907021798609437027705392171762931767523846748184676694051320005681271452635608277857713427577896091736371787214684409012249534301465495853710507922796892589235420199561121290219608640344181598136297747713099605187072113499999983729780499510597317328160963185950244594553469083026425223082533446850352619311881710100031378387528865875332083814206171776691473035982534904287554687311595628638823537875937519577818577805321712268066130019278766111959092164201989";

const ROWS=4,COLS=22,TOTAL=ROWS*COLS,CYCLE=4000,ROLL_MS=2000;
const PENTATONIC=[0,2,4,7,9,12,14,16,19,21];
const BASE_FREQ=220,BPM_MAX=96,BPM_MIN=42,PEAK_HOUR=12;

let piOffset=0,lastFlip=Date.now();
let chiming=false,lastHour=-1;
let actx=null,revNode=null,mGain=null,playing=false,stepIdx=0,nxt=0,schedT=null;

// ── 廣播時間軸同步 ──
// 固定開播起點：2026-03-14 01:59:26 UTC（π Day 致敬）
// 任何人任何時候進來，都從同一時間軸的正確位置開始
const BROADCAST_EPOCH = new Date('2026-03-14T01:59:26Z').getTime();
const BPM_SYNC = 72; // 同步計算用固定 BPM（不隨時間變動，確保位置精準）

function getSyncedStepIdx() {
  const now = Date.now();
  const elapsedMs = now - BROADCAST_EPOCH;
  if (elapsedMs < 0) return 0; // 開播前從頭開始
  const msPerBeat = 60000 / BPM_SYNC;
  return Math.floor(elapsedMs / msPerBeat) % PI.length;
}

const gridEl=document.getElementById('grid');
const cells=[];
for(let i=0;i<TOTAL;i++){
  const cell=document.createElement('div'); cell.className='cell';
  const ht=document.createElement('div'); ht.className='half-top';
  const nt=document.createElement('span'); nt.className='n'; nt.textContent=PI[i%PI.length];
  ht.appendChild(nt);
  const hb=document.createElement('div'); hb.className='half-bot';
  const nb=document.createElement('span'); nb.className='n'; nb.textContent=PI[i%PI.length];
  hb.appendChild(nb);
  cell.appendChild(ht); cell.appendChild(hb);
  gridEl.appendChild(cell);
  cells.push({cell,ht,hb,nt,nb,cur:PI[i%PI.length],ft:null,queue:[],running:false});
}


function flipTo_cb(cd, val, dur, onDone){
  cd.queue = [];
  cd.running = false;
  clearTimeout(cd.ft);
  flipOne(cd, val, dur, onDone);
}

function flipOne(cd, val, dur, onDone){
  const half = Math.max(dur/2, 18);
  cd.ht.style.transition = `transform ${half}ms ease-in`;
  cd.ht.style.transform = 'scaleY(0)';
  cd.ft = setTimeout(()=>{
    cd.nt.textContent = val;
    cd.nb.textContent = val;
    cd.cur = String(val);
    cd.ht.style.transition = `transform ${half}ms ease-out`;
    cd.ht.style.transform = 'scaleY(1)';
    cd.ft = setTimeout(()=>{
      if(onDone) onDone();
    }, half);
  }, half);
}

function runQueue(cd){
  if(cd.running || cd.queue.length===0) return;
  cd.running = true;
  const {val, dur} = cd.queue.shift();
  flipOne(cd, val, dur, ()=>{
    cd.running = false;
    runQueue(cd);
  });
}

function flipTo(cd, val, dur){
  // 清掉舊佇列，只保留最新目標（中途換頁時不累積舊動畫）
  cd.queue = [{val, dur}];
  if(!cd.running) runQueue(cd);
}

function rollCell(cd, target){
  const cur = parseInt(cd.cur)||0;
  const tgt = parseInt(target);
  const steps = ((tgt-cur+10)%10)||10;
  const stepMs = Math.floor(ROLL_MS/steps);
  const flipDur = Math.min(stepMs*0.75, 120);
  // 把所有步驟加進佇列，嚴格排隊
  cd.queue = [];
  for(let s=1; s<=steps; s++){
    cd.queue.push({val: String((cur+s)%10), dur: flipDur});
  }
  if(!cd.running) runQueue(cd);
}


function getPage(off){let s='';for(let i=0;i<TOTAL;i++)s+=PI[(off+i)%PI.length];return s;}

function piTick(){
  if(chiming) return;
  piOffset=(piOffset+TOTAL)%PI.length;
  const nd=getPage(piOffset);
  lastFlip=Date.now();
  cells.forEach((cd,i)=>rollCell(cd,nd[i]));
  const pr=document.getElementById('prange');
  if(pr) pr.textContent=`π digits ${piOffset+1}–${piOffset+TOTAL}`;
}

function triggerChime(){
  if(chiming)return;
  chiming=true;
  const now=new Date();
  const hh=String(now.getHours()).padStart(2,'0');
  const mm=String(now.getMinutes()).padStart(2,'0');
  if(actx) playFlipNoise();
  const STEP_MS=75;
  let allBlack=0;
  cells.forEach(cd=>{
    const cur=parseInt(cd.cur)||0;
    const stepsTo9=9-cur;
    for(let s=1;s<=stepsTo9;s++){
      setTimeout(()=>flipTo(cd,String(cur+s),STEP_MS*0.85,null),s*STEP_MS);
    }
    setTimeout(()=>{
      flipTo_cb(cd,' ',STEP_MS*0.85,()=>{
        allBlack++;
        if(allBlack===TOTAL) showTime();
      });
    },(stepsTo9+1)*STEP_MS);
  });

  function showTime(){
    setTimeout(()=>{
      const layout=buildChimeLayout(hh,mm);
      let shown=0;
      cells.forEach((cd,i)=>{
        const col=i%COLS,row=Math.floor(i/COLS);
        setTimeout(()=>{
          const val=layout[i];
          if(val&&val.trim()) flipTo(cd,val,120);
          shown++;
          if(shown===TOTAL) waitReturn();
        },col*28+row*55);
      });
    },300);
  }

  function waitReturn(){
    setTimeout(()=>{
      const nd=getPage(piOffset);
      let back=0;
      cells.forEach((cd,i)=>{
        const col=i%COLS,row=Math.floor(i/COLS);
        setTimeout(()=>{
          flipTo(cd,nd[i],110);
          back++;
          if(back===TOTAL){
          setTimeout(()=>{
            chiming=false;
            lastFlip=Date.now();
          },400);
        }
        },col*25+row*45);
      });
    },10000);
  }
}

function buildChimeLayout(hh,mm){
  const out=Array(TOTAL).fill(' ');
  const now=new Date();
  const days=['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const months=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const tc=[hh[0],hh[1],':',mm[0],mm[1]];
  const ts=Math.floor((COLS-tc.length)/2);
  tc.forEach((c,i)=>{out[COLS+ts+i]=c;});
  const ds=`${months[now.getMonth()]} ${String(now.getDate()).padStart(2,'0')} ${days[now.getDay()]}`.split('');
  const doff=Math.floor((COLS-ds.length)/2);
  ds.forEach((c,i)=>{if(doff+i>=0&&doff+i<COLS)out[COLS*2+doff+i]=c;});
  return out;
}

function playFlipNoise(){
  const ticks=Math.floor(0.9/0.018);
  for(let i=0;i<ticks;i++){
    const when=actx.currentTime+i*0.018;
    const len=Math.floor(actx.sampleRate*0.012);
    const buf=actx.createBuffer(1,len,actx.sampleRate);
    const d=buf.getChannelData(0);
    const vol=(1-i/ticks)*0.35;
    for(let j=0;j<len;j++) d[j]=(Math.random()*2-1)*Math.pow(1-j/len,3)*vol;
    const src=actx.createBufferSource(); src.buffer=buf;
    const f=actx.createBiquadFilter();
    f.type='bandpass'; f.frequency.value=3200+Math.random()*800; f.Q.value=1.8;
    const g=actx.createGain(); g.gain.value=0.55;
    src.connect(f); f.connect(g); g.connect(mGain);
    src.start(when);
  }
}

function checkHour(){
  const now=new Date();
  if(now.getMinutes()===0&&now.getSeconds()===0&&now.getHours()!==lastHour){
    lastHour=now.getHours(); triggerChime();
  }
}

// vis bars already created above

function setupAudio(){
  if(actx)return;
  actx=new(window.AudioContext||window.webkitAudioContext)();
  mGain=actx.createGain(); mGain.gain.value=0.45; mGain.connect(actx.destination);
  const len=actx.sampleRate*2,rb=actx.createBuffer(2,len,actx.sampleRate);
  for(let c=0;c<2;c++){const d=rb.getChannelData(c);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.2);}
  revNode=actx.createConvolver(); revNode.buffer=rb;
  const rg=actx.createGain(); rg.gain.value=0.65; revNode.connect(rg); rg.connect(mGain);
}

function getBPM(){
  const now=new Date(),h=now.getHours()+now.getMinutes()/60;
  return Math.round(BPM_MIN+(BPM_MAX-BPM_MIN)*(Math.cos(((h-PEAK_HOUR)/12)*Math.PI)+1)/2);
}
function getMood(b){return b>=88?'daytime':b>=72?'evening':b>=58?'night':'late night';}

function playNote(digit,when,dur){
  const freq=BASE_FREQ*Math.pow(2,PENTATONIC[digit]/12);
  const osc=actx.createOscillator(); osc.type='sine'; osc.frequency.value=freq;
  const env=actx.createGain();
  env.gain.setValueAtTime(0,when); env.gain.linearRampToValueAtTime(0.6,when+0.02);
  env.gain.exponentialRampToValueAtTime(0.001,when+dur*0.88);
  osc.connect(env); env.connect(mGain); env.connect(revNode);
  osc.start(when); osc.stop(when+dur);
  const bi=stepIdx%22;
  setTimeout(()=>{vbars.forEach((b,i)=>{b.style.height=(i===bi?`${4+digit*3}px`:'2px');b.style.opacity=(i===bi?'0.9':'0.2');});},Math.max(0,(when-actx.currentTime)*1000));
}

function schedule(){
  if(!playing||!actx||actx.state==='suspended')return;
  const spb=60/getBPM();
  while(nxt<actx.currentTime+0.35){playNote(parseInt(PI[stepIdx%PI.length]),nxt,spb*0.82);nxt+=spb;stepIdx++;}
  schedT=setTimeout(schedule,120);
}

function startMusic(){
  setupAudio();
  actx.resume().then(()=>{
    playing=true;
    // 從廣播時間軸的正確位置開始
    stepIdx = getSyncedStepIdx();
    nxt = actx.currentTime + 0.1;
    schedule();
    document.getElementById('status').textContent='playing';
    document.getElementById('sdot').classList.add('on');
  });
}

window.addEventListener('load',()=>{
  setTimeout(()=>{
    try{
      startMusic();
      if(actx&&actx.state==='suspended'){
        document.getElementById('status').textContent='click to start';
        document.addEventListener('click',function r(){startMusic();document.removeEventListener('click',r);},{once:true});
      }
    }catch(e){
      document.getElementById('status').textContent='click to start';
      document.addEventListener('click',function r(){startMusic();document.removeEventListener('click',r);},{once:true});
    }
  },500);
});

function frame(){
  const now=Date.now(),bpm=getBPM();
  const pfEl=document.getElementById('pf');
  const bpmEl=document.getElementById('bpmv');
  const moodEl=document.getElementById('mood');
  const clkEl=document.getElementById('clk');
  if(pfEl) pfEl.style.width=Math.min((now-lastFlip)/CYCLE*100,100)+'%';
  if(bpmEl) bpmEl.textContent=bpm+' BPM';
  if(moodEl) moodEl.textContent=getMood(bpm);
  if(clkEl){
    const d=new Date();
    clkEl.textContent=[d.getHours(),d.getMinutes(),d.getSeconds()].map(n=>String(n).padStart(2,'0')).join(':');
  }
  requestAnimationFrame(frame);
}

// 確保 DOM 完全載入後才啟動
window.addEventListener('load', function() {
  // 重置所有狀態
  chiming = false;
  lastHour = -1;
  piOffset = 0;
  lastFlip = Date.now();

  // 啟動翻牌
  setInterval(piTick, CYCLE);
  setInterval(checkHour, 1000);

  // 立刻執行第一次翻牌（不要等 CYCLE 才開始）
  setTimeout(piTick, 500);

  // 啟動時鐘
  frame();
});

// 覆寫 frame 函式，同步更新 clk2
const _origFrame = frame;
function frame(){
  const now=Date.now(),bpm=getBPM();
  document.getElementById('pf').style.width=Math.min((now-lastFlip)/CYCLE*100,100)+'%';
  document.getElementById('bpmv').textContent=bpm+' BPM';
  document.getElementById('mood').textContent=getMood(bpm);
  const d=new Date();
  const ts=[d.getHours(),d.getMinutes(),d.getSeconds()].map(n=>String(n).padStart(2,'0')).join(' : ');
  document.getElementById('clk').textContent=ts.replace(/ : /g,':');
  document.getElementById('clk2').textContent=ts;
  requestAnimationFrame(frame);
}

// 覆蓋 playNote 以驅動琴鍵（在原本的 playNote 之後加鉤子）
const _origPlayNote=playNote;
// 重新定義讓琴鍵亮起
function playNote(digit,when,dur){
  _origPlayNote(digit,when,dur);
  // 琴鍵亮起：用 digit 決定哪根鍵最亮，周圍漸暗
  const delay=Math.max(0,(when-(actx?actx.currentTime:0))*1000);
  setTimeout(()=>{
    pkeys.forEach((k,i)=>{
      const dist=Math.abs(i-digit*2.2|0);
      k.style.height=dist===0?'28px':dist===1?'18px':dist===2?'10px':'3px';
      k.style.opacity=dist===0?'0.9':dist===1?'0.5':dist===2?'0.25':'0.08';
    });
  },delay);
}

// startMusic 後更新狀態
const _origStartMusic=startMusic;
function startMusic(){
  _origStartMusic();
  setTimeout(()=>{
    document.getElementById('status').textContent='playing';
    document.getElementById('sdot').classList.add('on');
  },400);
}

drawBpmCurve();
setInterval(drawBpmCurve,60000);
